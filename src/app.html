<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<script>
			// Apply saved display/accessibility preferences before first paint (no flash).
			try {
				var p = JSON.parse(localStorage.getItem('did-prefs') || '{}');
				var el = document.documentElement;
				var accessible = p.mode === 'accessible';
				if (accessible) el.setAttribute('data-mode', 'accessible');
				if (accessible && p.theme && p.theme !== 'system') el.setAttribute('data-theme', p.theme);
				if (p.textSize && p.textSize !== 'default') el.setAttribute('data-text-size', p.textSize);
				if (p.motion === 'reduce' || accessible) el.setAttribute('data-motion', 'reduce');
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
